<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>בדיקת סרטון</title>
</head>
<body>
    <h1 style="text-align:center; font-family:sans-serif;">עמוד בדיקת סרטון</h1>
    
    <div style="position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; max-width: 800px; margin: 0 auto; border: 2px solid #ccc; border-radius: 8px;">
      <iframe 
        src="https://youtube.com" 
        style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none;" 
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
        allowfullscreen>
      </iframe>
    </div>
