<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>משה גינזי - הורדת האפליקציה</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Arial,sans-serif;background:#0a0a0a;color:#d4af37;display:flex;justify-content:center;align-items:center;min-height:100vh;text-align:center}
.container{padding:30px;max-width:500px}
h1{font-size:28px;margin-bottom:10px}
p{font-size:16px;color:#ccc;margin-bottom:30px}
.badges{display:flex;flex-direction:column;align-items:center;gap:15px}
.badges a img{height:60px;transition:transform 0.2s}
.badges a img:hover{transform:scale(1.05)}
.auto-msg{font-size:14px;color:#888;margin-top:25px}
.photo{width:120px;height:120px;border-radius:25px;margin-bottom:20px;border:2px solid #d4af37}
</style>
<script>
var ios = "https://apps.apple.com/app/id6786922851";
var android = "https://play.google.com/store/apps/details?id=com.mosheginzy.app";
var ua = navigator.userAgent || "";
if (/iPhone|iPad|iPod/i.test(ua)) {
  window.location.href = ios;
} else if (/Android/i.test(ua)) {
  window.location.href = android;
}
</script>
</head>
<body>
<div class="container">
<img class="photo" src="https://aginsberger-cpu.github.io/mosheginzy/icons/moshe-photo.png" alt="משה גינזי" onerror="this.style.display='none'">
<h1>משה גינזי</h1>
<p>לימוד יהדות בגובה העיניים. בלי פילטרים.</p>
<div class="badges">
<a href="https://apps.apple.com/app/id6786922851">
<img src="https://tools.applemediaservices.com/api/badges/download-on-the-app-store/black/he-il?size=250x83" alt="הורדה מ-App Store">
</a>
<a href="https://play.google.com/store/apps/details?id=com.mosheginzy.app">
<img src="https://play.google.com/intl/en_us/badges/static/images/badges/he_badge_web_generic.png" alt="הורדה מ-Google Play" style="height:90px">
</a>
</div>
<p class="auto-msg">מועבר אוטומטית לחנות המתאימה למכשיר שלך</p>
</div>
</body>
</html>
